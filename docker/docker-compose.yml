# docker/docker-compose.yml
version: "3.8"

services:
  # Main trading application
  hopefx:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: hopefx-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - ENVIRONMENT=production
      - DB_HOST=postgres
      - REDIS_HOST=redis
      - LOG_LEVEL=INFO
    env_file:
      - ../.env
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      timescaledb:
        condition: service_healthy
    networks:
      - hopefx-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health/ready"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 4G
        reservations:
          cpus: '1.0'
          memory: 2G

  # TimescaleDB for market data
  timescaledb:
    image: timescale/timescaledb:latest-pg15
    container_name: hopefx-timescale
    restart: unless-stopped
    environment:
      POSTGRES_USER: hopefx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: market_data
    volumes:
      - timescale_data:/var/lib/postgresql/data
      - ../scripts/init_timescale.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5433:5432"
    networks:
      - hopefx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hopefx"]
      interval: 5s
      timeout: 5s
      retries: 5

  # PostgreSQL for application data
  postgres:
    image: postgres:15-alpine
    container_name: hopefx-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hopefx
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: hopefx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hopefx-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U hopefx"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis for caching and pub/sub
  redis:
    image: redis:7-alpine
    container_name: hopefx-redis
    restart: unless-stopped
    command: redis-server --appendonly yes --maxmemory 2gb --maxmemory-policy allkeys-lru
    volumes:
      - redis_data:/data
    networks:
      - hopefx-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  # Grafana for visualization
  grafana:
    image: grafana/grafana:latest
    container_name: hopefx-grafana
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana_data:/var/lib/grafana
      - ../monitoring/grafana/dashboards:/etc/grafana/provisioning/dashboards
      - ../monitoring/grafana/datasources:/etc/grafana/provisioning/datasources
    networks:
      - hopefx-network
    depends_on:
      - hopefx

  # Prometheus for metrics collection
  prometheus:
    image: prom/prometheus:latest
    container_name: hopefx-prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ../monitoring/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
      - prometheus_data:/prometheus
    networks:
      - hopefx-network

  # ML Model Server (optional GPU support)
  ml-server:
    build:
      context: ..
      dockerfile: docker/Dockerfile.ml
    container_name: hopefx-ml
    restart: unless-stopped
    environment:
      - CUDA_VISIBLE_DEVICES=0
      - MODEL_REGISTRY_PATH=/models
    volumes:
      - ml_models:/models
    networks:
      - hopefx-network
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

volumes:
  timescale_data:
  postgres_data:
  redis_data:
  grafana_data:
  prometheus_data:
  ml_models:

networks:
  hopefx-network:
    driver: bridge
