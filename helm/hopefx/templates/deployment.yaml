apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "hopefx.fullname" . }}-api
  labels:
    {{- include "hopefx.labels" . | nindent 4 }}
    component: api
spec:
  replicas: {{ .Values.api.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 10%
  selector:
    matchLabels:
      {{- include "hopefx.selectorLabels" . | nindent 6 }}
      component: api
  template:
    metadata:
      labels:
        {{- include "hopefx.selectorLabels" . | nindent 8 }}
        component: api
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "9090"
        prometheus.io/path: "/metrics"
    spec:
      serviceAccountName: {{ include "hopefx.serviceAccountName" . }}
      securityContext:
        runAsNonRoot: true
        runAsUser: 999
        fsGroup: 999
      
      initContainers:
        - name: migrations
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          command: ["alembic", "upgrade", "head"]
          envFrom:
            - secretRef:
                name: {{ include "hopefx.fullname" . }}-secrets
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
      
      containers:
        - name: api
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
            - name: metrics
              containerPort: 9090
              protocol: TCP
          envFrom:
            - secretRef:
                name: {{ include "hopefx.fullname" . }}-secrets
            - configMapRef:
                name: {{ include "hopefx.fullname" . }}-config
          env:
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_IP
              valueFrom:
                fieldRef:
                  fieldPath: status.podIP
          livenessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/v1/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 3
          resources:
            {{- toYaml .Values.api.resources | nindent 12 }}
          volumeMounts:
            - name: models
              mountPath: /app/models
            - name: vault
              mountPath: /app/.vault
      volumes:
        - name: models
          persistentVolumeClaim:
            claimName: {{ include "hopefx.fullname" . }}-models
        - name: vault
          persistentVolumeClaim:
            claimName: {{ include "hopefx.fullname" . }}-vault
