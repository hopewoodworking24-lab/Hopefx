version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - APP_ENV=production
      - LOG_LEVEL=INFO
      - DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/hopefx
      - REDIS_URL=redis://redis:6379/0
      - BROKER_DEFAULT=paper
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - hopefx-network
    restart: unless-stopped

  worker:
    build:
      context: .
      dockerfile: deployments/docker/Dockerfile
    command: python -m src.main worker
    environment:
      - APP_ENV=production
      - DB_URL=postgresql+asyncpg://postgres:postgres@db:5432/hopefx
      - REDIS_URL=redis://redis:6379/0
    depends_on:
      - db
      - redis
    volumes:
      - ./logs:/app/logs
      - ./models:/app/models
    networks:
      - hopefx-network
    restart: unless-stopped

  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=hopefx
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - hopefx-network
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    volumes:
      - redis_data:/data
    networks:
      - hopefx-network
    restart: unless-stopped

  prometheus:
    image: prom/prometheus:latest
    volumes:
      - ./deployments/prometheus.yml:/etc/prometheus/prometheus.yml
    ports:
      - "9090:9090"
    networks:
      - hopefx-network

  grafana:
    image: grafana/grafana:latest
    ports:
      - "3000:3000"
    volumes:
      - grafana_data:/var/lib/grafana
    networks:
      - hopefx-network

volumes:
  postgres_data:
  redis_data:
  grafana_data:

networks:
  hopefx-network:
    driver: bridge

  backup:
    image: offen/docker-volume-backup:latest
    volumes:
      - postgres_data:/backup/data:ro
      - ./backups:/archive
    environment:
      BACKUP_CRON_EXPRESSION: "0 2 * * *"
      BACKUP_RETENTION_DAYS: "30"
