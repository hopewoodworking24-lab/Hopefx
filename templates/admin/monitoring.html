{% extends "base.html" %}

{% block content %}
<div class="card">
    <h2 style="margin-bottom: 15px;">System Metrics</h2>
    <div class="stats-grid">
        <div class="stat-card">
            <div style="font-size: 14px; color: #7f8c8d;">CPU Usage</div>
            <div class="stat-value" id="cpu-usage">--</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 14px; color: #7f8c8d;">Memory Usage</div>
            <div class="stat-value" id="memory-usage">--</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 14px; color: #7f8c8d;">Active Connections</div>
            <div class="stat-value" id="connections">--</div>
        </div>
        <div class="stat-card">
            <div style="font-size: 14px; color: #7f8c8d;">Uptime</div>
            <div class="stat-value" id="uptime">--</div>
        </div>
    </div>
    <div style="margin-top:12px;font-size:13px;display:flex;gap:24px;">
        <span>Cache: <span id="cache-status" style="font-weight:600;">--</span></span>
        <span>Database: <span id="db-status" style="font-weight:600;">--</span></span>
    </div>
</div>

<div class="card">
    <h2 style="margin-bottom: 15px;">Risk Metrics</h2>
    <div id="risk-metrics">
        <p style="color: #7f8c8d;">Loading risk metrics...</p>
    </div>
</div>

<div class="card">
    <h2 style="margin-bottom: 15px;">Recent Signals</h2>
    <div id="recent-signals">
        <p style="color: #7f8c8d;">No recent signals</p>
    </div>
</div>

<script>
async function loadSystemMetrics() {
    try {
        const resp = await fetch('/admin/api/system-metrics');
        if (!resp.ok) throw new Error('HTTP ' + resp.status);
        const m = await resp.json();
        document.getElementById('cpu-usage').textContent = m.cpu_percent != null ? m.cpu_percent.toFixed(1) + '%' : 'N/A';
        document.getElementById('memory-usage').textContent = m.memory_used_mb != null ? m.memory_used_mb + ' MB' + (m.memory_percent != null ? ' (' + m.memory_percent + '%)' : '') : 'N/A';
        document.getElementById('connections').textContent = m.active_connections ?? 0;
        document.getElementById('uptime').textContent = m.uptime || '--';
        const cacheEl = document.getElementById('cache-status');
        cacheEl.textContent = m.cache_status || '--';
        cacheEl.style.color = m.cache_status === 'available' ? '#27ae60' : '#e74c3c';
        const dbEl = document.getElementById('db-status');
        dbEl.textContent = m.database_status || '--';
        dbEl.style.color = m.database_status === 'available' ? '#27ae60' : '#e74c3c';
    } catch (err) {
        console.error('Failed to load system metrics:', err);
    }
}

async function loadRiskMetrics() {
    try {
        const response = await fetch('/api/trading/risk-metrics');
        const metrics = await response.json();
        const el = document.getElementById('risk-metrics');
        
        el.innerHTML = `
            <table>
                <tr><td>Current Balance:</td><td>$${metrics.current_balance || 0}</td></tr>
                <tr><td>Total P&L:</td><td style="color: ${(metrics.total_pnl || 0) >= 0 ? '#27ae60' : '#e74c3c'}">$${metrics.total_pnl || 0}</td></tr>
                <tr><td>Daily P&L:</td><td>$${metrics.daily_pnl || 0}</td></tr>
                <tr><td>Open Positions:</td><td>${metrics.open_positions || 0} / ${metrics.max_positions || 0}</td></tr>
                <tr><td>Current Drawdown:</td><td>${metrics.current_drawdown || 0}%</td></tr>
            </table>
        `;
    } catch (error) {
        console.error('Failed to load risk metrics:', error);
    }
}

async function refreshAll() {
    await Promise.all([loadSystemMetrics(), loadRiskMetrics()]);
}

document.addEventListener('DOMContentLoaded', refreshAll);
setInterval(refreshAll, 5000);
</script>
{% endblock %}
